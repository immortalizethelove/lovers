<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Bizim Şarkımız ❤️</title><style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
text-align:center;
}

.container{
margin-top:80px;
}

input{
padding:15px;
font-size:18px;
width:250px;
border-radius:10px;
border:none;
}

button{
padding:15px 30px;
font-size:18px;
margin-top:20px;
border:none;
border-radius:20px;
background:pink;
cursor:pointer;
}

#error{
color:red;
margin-top:15px;
display:none;
font-size:18px;
}

#foto{
display:none;
margin-top:30px;
width:80%;
max-width:350px;
border-radius:20px;
}

#play{
display:none;
}

</style></head><body><h1>Bizim Şarkımız ❤️</h1><div class="container"><input id="kod" placeholder="Kodu gir"><br><button onclick="kontrol()">Aç</button>

<div id="error">Yanlış Kod</div><img id="foto"
src="https://res.cloudinary.com/dbtlit7hz/image/upload/v1773339119/clients/x7Kp92Lm.jpg">

<br><button id="play" onclick="cal()">Şarkıyı Çal 🎵</button>

<audio id="music">
<source src="codes/x7Kp92Lm/sarki.mp3" type="audio/mpeg">
</audio></div><script>

function kontrol(){

let kod=document.getElementById("kod").value.trim()

if(kod==="x7Kp92Lm"){

document.getElementById("foto").style.display="block"
document.getElementById("play").style.display="inline-block"
document.getElementById("error").style.display="none"

}else{

document.getElementById("error").style.display="block"

}

}

function cal(){

document.getElementById("music").play()

}

</script></body>
</html>
