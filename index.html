<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love</title>
<style>
body{margin:0;background:black;overflow:hidden;font-family:Arial;}
#stage{position:fixed;width:100%;height:100%;background:black;display:flex;align-items:center;justify-content:center;}
#playBtn{position:absolute;z-index:20;width:120px;height:120px;background:black;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 0 30px rgba(0,0,0,0.8);}
#playBtn:after{content:"";border-left:35px solid white;border-top:20px solid transparent;border-bottom:20px solid transparent;margin-left:6px;}
.curtain{position:absolute;top:0;width:50%;height:100%;background-image:url("curtain.jpg");background-size:200% 100%;background-repeat:no-repeat;transition:2.2s ease;z-index:10;}
#leftCurtain{left:0;background-position:left center;}
#rightCurtain{right:0;background-position:right center;}
.openLeft{transform:translateX(-100%);}
.openRight{transform:translateX(100%);}
#countdown{position:absolute;display:none;width:100%;height:100%;z-index:5;}
#countVideo{width:100%;height:100%;object-fit:cover;}
#flash{position:fixed;width:100%;height:100%;background:white;opacity:0;pointer-events:none;transition:0.3s;}
#codeScreen{position:fixed;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;background:black;color:white;text-align:center;}
input{padding:12px;font-size:18px;border:none;border-radius:8px;margin-top:10px;}
button{padding:12px 25px;margin-top:10px;border:none;border-radius:20px;background:#e91e63;color:white;font-size:18px;cursor:pointer;}
#error{color:red;margin-top:10px;display:none;}
#result{display:none;position:fixed;width:100%;height:100%;background:black;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:20px;box-sizing:border-box;}
#photo{width:80%;max-width:400px;border-radius:20px;margin-bottom:10px;}
#musicBox{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:black;z-index:50;}
#player{width:100%;height:100%;filter:blur(20px);transition:1.2s;}
#heartLayer{position:fixed;width:100%;height:100%;top:0;left:0;pointer-events:none;overflow:hidden;z-index:999;}
.heart{position:absolute;color:red;font-size:22px;animation:float 6s linear infinite;}
@keyframes float{0%{transform:translateY(100vh);opacity:1}100%{transform:translateY(-10vh);opacity:0}}
#introOverlay{position:fixed;top:0;left:0;width:100%;height:100%;background:black;color:white;display:none;align-items:center;justify-content:center;flex-direction:column;z-index:200;font-size:28px;text-align:center;padding:20px;box-sizing:border-box;}
.fade{animation:fadeText 3s;}
@keyframes fadeText{0%{opacity:0;transform:translateY(20px)}50%{opacity:1}100%{opacity:0;transform:translateY(-20px)}}
</style>
</head>
<body>

<div id="stage">
<div id="playBtn" onclick="startExperience()"></div>
<div id="leftCurtain" class="curtain"></div>
<div id="rightCurtain" class="curtain"></div>
<div id="countdown"><video id="countVideo" src="countdown.mp4"></video></div>
</div>

<div id="flash"></div>

<div id="codeScreen">
<h2>❤️Sürprize son bir adım❤️</h2>
<input id="codeInput" placeholder="Kod gir">
<button onclick="go()">Aç</button>
<div id="error">Yanlış Kod</div>
</div>

<div id="result">
<img id="photo">
<button onclick="playMusic()">Şarkıyı Çal 🎵</button>
</div>

<div id="musicBox">
<div id="player"></div>
</div>

<div id="introOverlay">
<div id="introText"></div>
</div>

<div id="heartLayer"></div>
<audio id="introSound" src="intro.mp3"></audio>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
const youtubeLinks={
"x7Kp92Lm":"06-XXOTP3Gc",
"tAmGkL87":"_eij6Vs7FGo"
};
let currentCode="", player, videoOpen=false;

/* GERİ TUŞU */
window.addEventListener("popstate",function(){if(videoOpen) closeVideo(true);});

function startExperience(){
playBtn.style.display="none";
leftCurtain.classList.add("openLeft");
rightCurtain.classList.add("openRight");
setTimeout(startCountdown,2200);
}

function startCountdown(){
countdown.style.display="block";
countVideo.play();
countVideo.onended=function(){flash();}
}

function flash(){
flash.style.opacity="1";
setTimeout(()=>{flash.style.opacity="0";showCode();},300);
}

function showCode(){
stage.style.display="none";
codeScreen.style.display="flex";
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerText="❤";
h.style.left=Math.random()*100+"%";
heartLayer.appendChild(h);
setTimeout(()=>h.remove(),6000);
},300);
}

function go(){
let code=codeInput.value.trim();
if(code==="") return;
currentCode=code;
let photoURL="https://res.cloudinary.com/dbtlit7hz/image/upload/clients/"+code+"/"+code+".jpg";
let img=new Image();
img.onload=function(){
photo.src=photoURL;
codeScreen.style.display="none";
result.style.display="flex";
};
img.onerror=function(){error.style.display="block";};
img.src=photoURL;
}

function playMusic(){
let id=youtubeLinks[currentCode];
if(!id){alert("Şarkı yok");return;}
result.style.display="none";
musicBox.style.display="block";

/* SİNEMATİK INTRO */
introOverlay.style.display="flex";
introText.innerHTML="Seninle her an bir mucize ❤️";
introText.className="fade";
introSound.volume=0.25;
introSound.play();

setTimeout(()=>{
introText.innerHTML="Bu şarkı sadece sana...";
introText.className="fade";
},3000);

setTimeout(()=>{startYTVideo(id);},6500);

history.pushState({video:true},"");
videoOpen=true;
}

function startYTVideo(id){
player=new YT.Player('player',{
videoId:id,
playerVars:{start:12},
events:{
'onReady':function(e){
document.getElementById("player").style.filter="blur(0px)";
introOverlay.style.display="none";
introSound.pause();
introSound.currentTime=0;
},
'onStateChange':onPlayerStateChange
}
});
}

function onPlayerStateChange(e){if(e.data===0) closeVideo(false);}

function closeVideo(fromBack){
musicBox.style.display="none";
result.style.display="flex";
if(player){player.destroy();player=null;}
document.getElementById("player").style.filter="blur(20px)";
videoOpen=false;
if(!fromBack){history.back();}
}
</script>
</body>
</html>
