<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love</title><style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial;
}

/* SAHNE */

#stage{
position:fixed;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
}

/* PLAY */

#playBtn{
position:absolute;
z-index:20;
width:120px;
height:120px;
background:black;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
box-shadow:0 0 30px rgba(0,0,0,0.8);
}

#playBtn:after{
content:"";
border-left:35px solid white;
border-top:20px solid transparent;
border-bottom:20px solid transparent;
margin-left:6px;
}

/* PERDE */

.curtain{
position:absolute;
top:0;
width:50%;
height:100%;
background-image:url("curtain.jpg");
background-size:200% 100%;
background-repeat:no-repeat;
transition:2s;
}

#leftCurtain{
left:0;
background-position:left;
}

#rightCurtain{
right:0;
background-position:right;
}

.openLeft{transform:translateX(-100%);}
.openRight{transform:translateX(100%);}

/* COUNTDOWN */

#countdown{
position:fixed;
width:100%;
height:100%;
background:url("film.jpg") center/cover no-repeat;
display:none;
align-items:center;
justify-content:center;
}

/* DAİRE */

.circle{
width:320px;
height:320px;
border-radius:50%;
position:relative;
display:flex;
align-items:center;
justify-content:center;
}

/* ÜÇGEN DİLİM */

.slice{
position:absolute;
width:100%;
height:100%;
border-radius:50%;
background:conic-gradient(
rgba(255,255,255,0.7) 0deg,
rgba(255,255,255,0.7) 40deg,
transparent 40deg
);
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

/* SAYI */

#number{
font-size:150px;
font-weight:bold;
color:black;
z-index:2;
}

/* FLASH */

#flash{
position:fixed;
width:100%;
height:100%;
background:white;
opacity:0;
transition:0.3s;
pointer-events:none;
}

/* CODE */

#codeScreen{
position:fixed;
width:100%;
height:100%;
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
background:black;
color:white;
text-align:center;
}

input{
padding:12px;
font-size:18px;
border:none;
border-radius:8px;
margin-top:10px;
}

button{
padding:12px 25px;
margin-top:10px;
border:none;
border-radius:20px;
background:#e91e63;
color:white;
font-size:18px;
cursor:pointer;
}

</style></head><body><div id="stage"><div id="playBtn" onclick="startExperience()"></div><div id="leftCurtain" class="curtain"></div>
<div id="rightCurtain" class="curtain"></div></div><div id="countdown"><div class="circle">
<div class="slice"></div>
<div id="number">3</div>
</div></div><div id="flash"></div><div id="codeScreen"><h2>❤️Sürprize son bir adım❤️</h2><input id="codeInput" placeholder="Kod gir">
<button onclick="go()">Aç</button></div><script>

function startExperience(){

document.getElementById("playBtn").style.display="none";

leftCurtain.classList.add("openLeft");
rightCurtain.classList.add("openRight");

setTimeout(startCountdown,2000);

}

function startCountdown(){

let cd=document.getElementById("countdown");
let num=document.getElementById("number");

cd.style.display="flex";

let numbers=[3,2,1];
let i=0;

num.innerText=numbers[i];

let interval=setInterval(()=>{

i++;

if(i<numbers.length){

num.innerText=numbers[i];

}else{

clearInterval(interval);
flash();

}

},1000);

}

function flash(){

let f=document.getElementById("flash");

f.style.opacity="1";

setTimeout(()=>{

f.style.opacity="0";
showCode();

},300);

}

function showCode(){

document.getElementById("countdown").style.display="none";

document.getElementById("codeScreen").style.display="flex";

}

function go(){

let code=document.getElementById("codeInput").value.trim();

if(code=="") return;

window.location.href="page.html?code="+code;

}

</script></body>
</html>
