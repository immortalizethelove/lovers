<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love</title><style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial;
}

/* SAHNE */

#stage{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
}

/* PLAY */

#playBtn{
position:absolute;
z-index:20;
width:120px;
height:120px;
background:black;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
box-shadow:0 0 30px rgba(0,0,0,0.8);
}

#playBtn:after{
content:"";
border-left:35px solid white;
border-top:20px solid transparent;
border-bottom:20px solid transparent;
margin-left:6px;
}

/* PERDE */

.curtain{
position:absolute;
top:0;
width:50%;
height:100%;
background-image:url("curtain.jpg");
background-size:200% 100%;
background-repeat:no-repeat;
transition:2.2s ease;
z-index:10;
}

#leftCurtain{
left:0;
background-position:left center;
}

#rightCurtain{
right:0;
background-position:right center;
}

.openLeft{
transform:translateX(-100%);
}

.openRight{
transform:translateX(100%);
}

/* FILM COUNTDOWN */

#countdown{
position:fixed;
width:100%;
height:100%;
background:url("film.jpg") center/cover no-repeat;
display:none;
align-items:center;
justify-content:center;
z-index:5;
}

#number{
font-size:160px;
color:black;
font-weight:bold;
}

/* FLASH */

#flash{
position:fixed;
width:100%;
height:100%;
background:white;
opacity:0;
pointer-events:none;
transition:0.3s;
}

/* CODE SCREEN */

#codeScreen{
position:fixed;
width:100%;
height:100%;
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
background:black;
color:white;
text-align:center;
}

input{
padding:12px;
font-size:18px;
border:none;
border-radius:8px;
margin-top:10px;
}

button{
padding:12px 25px;
margin-top:10px;
border:none;
border-radius:20px;
background:#e91e63;
color:white;
font-size:18px;
cursor:pointer;
}

/* UÇAN KALPLER */

.heart{
position:absolute;
color:red;
font-size:22px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:1}
100%{transform:translateY(-10vh);opacity:0}
}

</style></head><body><div id="stage"><div id="playBtn" onclick="startExperience()"></div><div id="leftCurtain" class="curtain"></div>
<div id="rightCurtain" class="curtain"></div></div><div id="countdown">
<div id="number">3</div>
</div><div id="flash"></div><div id="codeScreen"><h2>❤️Sürprize son bir adım❤️</h2><input id="codeInput" placeholder="Kod gir">
<button onclick="go()">Aç</button></div><script>

function startExperience(){

document.getElementById("playBtn").style.display="none";

document.getElementById("leftCurtain").classList.add("openLeft");
document.getElementById("rightCurtain").classList.add("openRight");

setTimeout(startCountdown,2200);

}

function startCountdown(){

let cd=document.getElementById("countdown");
let num=document.getElementById("number");

cd.style.display="flex";

let numbers=[3,2,1];
let i=0;

num.innerText=numbers[i];

let interval=setInterval(()=>{

i++;

if(i<numbers.length){

num.innerText=numbers[i];

}else{

clearInterval(interval);

flash();

}

},1000);

}

function flash(){

let flash=document.getElementById("flash");

flash.style.opacity="1";

setTimeout(()=>{

flash.style.opacity="0";
showCode();

},300);

}

function showCode(){

document.getElementById("countdown").style.display="none";

let screen=document.getElementById("codeScreen");
screen.style.display="flex";

setInterval(()=>{

let h=document.createElement("div");

h.className="heart";
h.innerText="❤";

h.style.left=Math.random()*100+"%";

document.body.appendChild(h);

setTimeout(()=>h.remove(),6000);

},300);

}

function go(){

let code=document.getElementById("codeInput").value.trim();

if(code=="") return;

window.location.href="page.html?code="+code;

}

</script></body>
</html>
